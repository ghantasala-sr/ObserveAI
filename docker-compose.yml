x-app-env: &app-env
  ENVIRONMENT: local
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  REDPANDA_BROKERS: redpanda:9092
  PAYMENT_SERVICE_URL: http://payment-service:8000
  INVENTORY_SERVICE_URL: http://inventory-service:8000
  CART_SERVICE_URL: http://cart-service:8000
  POSTGRES_DSN: postgresql://observeai:observeai@postgres:5432/observeai
  REDIS_URL: redis://redis:6379/0
  HTTP_TIMEOUT_SECONDS: "2.0"
  KAFKA_MAX_RETRIES: "3"
  LOG_LEVEL: INFO
  TRAFFIC_INTERVAL_SECONDS: "2.0"
  TRAFFIC_BURST_SIZE: "3"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: observeai
      POSTGRES_USER: observeai
      POSTGRES_PASSWORD: observeai
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observeai -d observeai"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - observeai-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.3.9
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --set
      - redpanda.auto_create_topics_enabled=true
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "19644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --api-urls localhost:9644 | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.117.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - signoz-network

  payment-service:
    build:
      context: .
      args:
        SERVICE_MODULE: services.payment.main
    environment:
      <<: *app-env
      SERVICE_NAME: payment-service
    depends_on:
      - otel-collector

  cart-service:
    build:
      context: .
      args:
        SERVICE_MODULE: services.cart.main
    environment:
      <<: *app-env
      SERVICE_NAME: cart-service
    ports:
      - "18081:8000"
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started

  inventory-service:
    build:
      context: .
      args:
        SERVICE_MODULE: services.inventory.main
    environment:
      <<: *app-env
      SERVICE_NAME: inventory-service
    depends_on:
      - otel-collector

  checkout-service:
    build:
      context: .
      args:
        SERVICE_MODULE: services.checkout.main
    environment:
      <<: *app-env
      SERVICE_NAME: checkout-service
    ports:
      - "18080:8000"
    depends_on:
      payment-service:
        condition: service_started
      inventory-service:
        condition: service_started
      cart-service:
        condition: service_started
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      otel-collector:
        condition: service_started

  ai-fraud-service:
    build:
      context: .
      args:
        SERVICE_MODULE: services.fraud.main
    environment:
      <<: *app-env
      SERVICE_NAME: ai-fraud-service
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      otel-collector:
        condition: service_started

  notification-service:
    build:
      context: .
      args:
        SERVICE_MODULE: services.notification.main
    environment:
      <<: *app-env
      SERVICE_NAME: notification-service
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      ai-fraud-service:
        condition: service_started
      otel-collector:
        condition: service_started

  analytics-service:
    build:
      context: .
      args:
        SERVICE_MODULE: services.analytics.main
    environment:
      <<: *app-env
      SERVICE_NAME: analytics-service
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      ai-fraud-service:
        condition: service_started
      otel-collector:
        condition: service_started

  traffic-generator:
    build:
      context: .
      args:
        SERVICE_MODULE: services.traffic.main
    command: ["python", "-m", "services.traffic.main"]
    environment:
      <<: *app-env
      SERVICE_NAME: traffic-generator
    depends_on:
      checkout-service:
        condition: service_started
      cart-service:
        condition: service_started
      ai-fraud-service:
        condition: service_started
      notification-service:
        condition: service_started
      analytics-service:
        condition: service_started
      otel-collector:
        condition: service_started

networks:
  signoz-network:
    external: true
    name: signoz-network

volumes:
  observeai-postgres-data:
